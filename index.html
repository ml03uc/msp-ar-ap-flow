// ─── HELPERS ──────────────────────────────────────────────────────────────────

function nodePos(node, w, h) { return { x:(node.x/100)*w, y:(node.y/100)*h }; }
function lerp(a,b,t){ return a+(b-a)*t; }

// ─── ANIMATED DOT ────────────────────────────────────────────────────────────

function FlowDot({ x1,y1,x2,y2,cpx,cpy,color,delay,active }) {
  const [t,setT] = useState(0);
  const rafRef = useRef(); const startRef = useRef(null);
  const DUR = 2200;
  useEffect(()=>{
    if(!active){setT(0);startRef.current=null;return;}
    const tick=(ts)=>{
      if(!startRef.current) startRef.current=ts-(delay||0);
      const el=Math.max(0,(ts-startRef.current))%DUR;
      setT(el/DUR);
      rafRef.current=requestAnimationFrame(tick);
    };
    rafRef.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(rafRef.current);
  },[active,delay]);
  if(!active) return null;
  const mt=t;
  const cx=(1-mt)*(1-mt)*x1+2*(1-mt)*mt*cpx+mt*mt*x2;
  const cy=(1-mt)*(1-mt)*y1+2*(1-mt)*mt*cpy+mt*mt*y2;
  const op=t<0.1?t/0.1:t>0.9?(1-t)/0.1:1;
  return <circle cx={cx} cy={cy} r={5} fill={color} opacity={op}/>;
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App(){
  const [activeTab,setActiveTab]       = useState("ar");
  const [selectedNode,setSelectedNode] = useState(null);
  const [hoveredFlow,setHoveredFlow]   = useState(null);
  const [persona,setPersona]           = useState("msp");
  const [animStep,setAnimStep]         = useState(null);
  const [svgSize,setSvgSize]           = useState({w:720,h:520});
  const [panelOpen,setPanelOpen]       = useState(true);
  // Per-flow visibility toggle: null means all visible
  const [hiddenFlows,setHiddenFlows]   = useState(new Set());
  const containerRef=useRef(); const animRef=useRef();

  const NODES   = { ...BASE_NODES, psa:PSA_BY_PERSONA[persona] };
  const FLOWS   = FLOWS_BY_PERSONA[persona];
  const visibleFlows = FLOWS.filter(f=>
    (activeTab==="all"?true:f.type===activeTab) && !hiddenFlows.has(f.id)
  );

  useEffect(()=>{
    const obs=new ResizeObserver(entries=>{
      for(const e of entries){
        const {width,height}=e.contentRect;
        setSvgSize({w:Math.max(width,300),h:Math.max(height,380)});
      }
    });
    if(containerRef.current) obs.observe(containerRef.current);
    return()=>obs.disconnect();
  },[]);

  useEffect(()=>{ setSelectedNode(null); setAnimStep(null); },[persona]);

  const {w,h} = svgSize;
  const NODE_R = Math.max(24,Math.min(32,w/24));

  const playSteps=useCallback(()=>{
    clearInterval(animRef.current);
    // Only animate flows that are currently visible
    const maxStep=Math.max(...visibleFlows.map(f=>f.step));
    let s=1; setAnimStep(s);
    animRef.current=setInterval(()=>{
      s++;
      if(s>maxStep){clearInterval(animRef.current);setTimeout(()=>setAnimStep(null),1000);return;}
      setAnimStep(s);
    },1300);
  },[visibleFlows]);

  useEffect(()=>()=>clearInterval(animRef.current),[]);

  const activeFlows = animStep ? visibleFlows.filter(f=>f.step<=animStep) : visibleFlows;

  const toggleFlow=(id)=>{
    setHiddenFlows(prev=>{
      const next=new Set(prev);
      next.has(id)?next.delete(id):next.add(id);
      return next;
    });
  };

  const allTabFlows = FLOWS.filter(f=>activeTab==="all"?true:f.type===activeTab);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#0f1117",color:"#e2e8f0"}}>

      {/* ── Header ─────────────────────────────────────────────────────────── */}
      <div style={{padding:"12px 18px 9px",borderBottom:"1px solid #1e2535",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div>
            <h1 style={{fontSize:17,fontWeight:700,color:"#f8fafc",letterSpacing:"-0.3px"}}>
              MSP &amp; Accounting — AR/AP Flow
            </h1>
            <p style={{fontSize:11,color:"#64748b",marginTop:2}}>
              Toggle flows on/off · Click nodes to explore · Switch persona to swap stack
            </p>
          </div>
          {/* Persona */}
          <div style={{marginLeft:"auto",display:"flex",background:"#1e293b",borderRadius:24,padding:3,border:"1px solid #334155",gap:2}}>
            {[{id:"msp",label:"🖥 MSP",sub:"PSA-led"},{id:"acct",label:"📊 Accounting Firm",sub:"PM-led"}].map(p=>(
              <button key={p.id} onClick={()=>setPersona(p.id)} style={{
                padding:"4px 12px",borderRadius:20,border:"none",fontSize:12,cursor:"pointer",fontWeight:600,transition:"all .2s",
                background:persona===p.id?"#1e40af":"transparent",
                color:persona===p.id?"#93c5fd":"#64748b",
              }}>{p.label} <span style={{fontSize:10,opacity:.7}}>{p.sub}</span></button>
            ))}
          </div>
        </div>

        <div style={{marginTop:7,padding:"6px 11px",background:"#1e293b",borderRadius:8,
          fontSize:12,color:"#94a3b8",borderLeft:"3px solid #3b82f6"}}>
          {persona==="msp"
            ?"MSP stack: PSA is the billing engine. It triggers invoices, syncs to accounting, and connects directly to the payment provider for auto-billing on recurring contracts."
            :"Accounting firm stack: PM tool replaces PSA. It tracks engagement milestones, triggers payment requests, and syncs confirmations back when clients pay."}
        </div>

        {/* Tabs + controls */}
        <div style={{display:"flex",gap:7,marginTop:9,alignItems:"center",flexWrap:"wrap"}}>
          {[["ar","💰 AR Flow","#60a5fa"],["ap","📤 AP Flow","#f472b6"],["all","🔄 Full View","#a78bfa"]].map(([id,lbl,col])=>(
            <button key={id} onClick={()=>{setActiveTab(id);setAnimStep(null);}} style={{
              padding:"4px 13px",borderRadius:20,border:"1px solid",fontSize:13,cursor:"pointer",fontWeight:600,transition:"all .2s",
              background:activeTab===id?`${col}22`:"transparent",
              borderColor:activeTab===id?col:"#334155",
              color:activeTab===id?col:"#64748b",
            }}>{lbl}</button>
          ))}
          <button onClick={playSteps} style={{
            padding:"4px 13px",borderRadius:20,border:"1px solid #334155",
            fontSize:13,cursor:"pointer",background:"#1e293b",color:"#94a3b8",
          }}>▶ Animate</button>
          {hiddenFlows.size>0 && (
            <button onClick={()=>setHiddenFlows(new Set())} style={{
              padding:"4px 13px",borderRadius:20,border:"1px solid #ef4444",
              fontSize:12,cursor:"pointer",background:"#1e293b",color:"#ef4444",
            }}>Reset ({hiddenFlows.size} hidden)</button>
          )}
          <button onClick={()=>setPanelOpen(v=>!v)} style={{
            marginLeft:"auto",padding:"4px 12px",borderRadius:20,border:"1px solid #334155",
            fontSize:12,cursor:"pointer",background:"#1e293b",color:"#94a3b8",
          }}>{panelOpen?"Hide →":"← Panel"}</button>
        </div>
      </div>

      {/* ── Body ────────────────────────────────────────────────────────────── */}
      <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>

        {/* SVG Canvas */}
        <div ref={containerRef} style={{flex:1,position:"relative",minHeight:0}}>
          <svg width="100%" height="100%" viewBox={`0 0 ${w} ${h}`} style={{display:"block"}}>
            <defs>
              {Object.values(NODES).map(nd=>(
                <radialGradient key={nd.id} id={`grad-${nd.id}`} cx="50%" cy="50%" r="50%">
                  <stop offset="0%"   stopColor={nd.color} stopOpacity="0.28"/>
                  <stop offset="100%" stopColor={nd.color} stopOpacity="0.02"/>
                </radialGradient>
              ))}
              <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              <filter id="glow2"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              {FLOWS.map(f=>(
                <marker key={f.id} id={`arr-${f.id}`} markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
                  <path d="M0,0 L0,5 L7,2.5 z" fill={f.color} opacity={0.9}/>
                </marker>
              ))}
            </defs>

            {/* Grid */}
            <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
              <path d="M40 0L0 0 0 40" fill="none" stroke="#161d2c" strokeWidth="0.5"/>
            </pattern></defs>
            <rect width={w} height={h} fill="url(#grid)"/>

            {/* ── Flows ── */}
            {allTabFlows.map(flow=>{
              const from=NODES[flow.from]; const to=NODES[flow.to];
              if(!from||!to) return null;
              const p1=nodePos(from,w,h); const p2=nodePos(to,w,h);
              const {cpx,cpy}=flow.cpFn(p1,p2,w,h);
              const path=`M ${p1.x} ${p1.y} Q ${cpx} ${cpy} ${p2.x} ${p2.y}`;

              const isHidden  = hiddenFlows.has(flow.id);
              const isVisible = !isHidden && (activeTab==="all"?true:flow.type===activeTab);
              const isActive  = isVisible && activeFlows.includes(flow);
              const isHovered = hoveredFlow===flow.id;
              const isHL      = flow.highlight;

              // Mid-curve label position (t=0.5 on bezier)
              const mt=0.5;
              const tx=(1-mt)*(1-mt)*p1.x+2*(1-mt)*mt*cpx+mt*mt*p2.x;
              const ty=(1-mt)*(1-mt)*p1.y+2*(1-mt)*mt*cpy+mt*mt*p2.y-10;

              return(
                <g key={flow.id}
                  opacity={isHidden ? 0.12 : animStep ? (isActive?1:0.1) : 1}
                  style={{transition:"opacity 0.35s",cursor:"pointer"}}
                  onMouseEnter={()=>setHoveredFlow(flow.id)}
                  onMouseLeave={()=>setHoveredFlow(null)}
                  onClick={()=>setHoveredFlow(isHovered?null:flow.id)}>

                  {/* Wide invisible hit area */}
                  <path d={path} fill="none" stroke="transparent" strokeWidth={20}/>

                  {/* Glow for highlight or hover */}
                  {(isHL||isHovered)&&!isHidden&&(
                    <path d={path} fill="none" stroke={flow.color}
                      strokeWidth={isHL?10:6} opacity={isHL?0.12:0.18} filter="url(#glow2)"/>
                  )}

                  {/* Main line */}
                  <path d={path} fill="none" stroke={flow.color}
                    strokeWidth={isHovered?2.8:isHL?2.2:1.6}
                    strokeDasharray={flow.type==="ap"?"8 4":"none"}
                    markerEnd={`url(#arr-${flow.id})`}
                    opacity={isHidden?0.15:isHovered?1:isHL?0.85:0.55}/>

                  {/* Always-on label for highlight flows */}
                  {isHL&&!isHidden&&!isHovered&&(activeTab==="ar"||activeTab==="all")&&(
                    <text x={tx} y={ty} textAnchor="middle" fontSize={9}
                      fill={flow.color} fontWeight={700} opacity={0.75}
                      style={{userSelect:"none",pointerEvents:"none"}}>
                      {flow.label}
                    </text>
                  )}

                  {/* Hover tooltip */}
                  {isHovered&&(
                    <>
                      <rect x={tx-115} y={ty-40} width={230} height={58} rx={7}
                        fill="#1a2235" stroke={flow.color} strokeWidth={1.2} opacity={0.98}/>
                      <text x={tx} y={ty-22} textAnchor="middle" fontSize={10}
                        fill={flow.color} fontWeight={700} style={{userSelect:"none"}}>
                        Step {flow.step} · {flow.label}
                      </text>
                      <foreignObject x={tx-108} y={ty-15} width={216} height={38}>
                        <div xmlns="http://www.w3.org/1999/xhtml"
                          style={{fontSize:10,color:"#94a3b8",lineHeight:"1.45",wordBreak:"break-word"}}>
                          {flow.detail}
                        </div>
                      </foreignObject>
                    </>
                  )}

                  {/* Animated dot */}
                  <FlowDot x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y}
                    cpx={cpx} cpy={cpy} color={flow.color}
                    delay={flow.step*200} active={isActive&&!isHidden}/>
                </g>
              );
            })}

            {/* ── Nodes ── */}
            {Object.values(NODES).map(nd=>{
              const p=nodePos(nd,w,h);
              const isSel=selectedNode?.id===nd.id;
              const isPay=nd.id==="payment";
              return(
                <g key={nd.id} style={{cursor:"pointer"}}
                  onClick={()=>{setSelectedNode(isSel?null:nd);if(!panelOpen)setPanelOpen(true);}}>
                  <circle cx={p.x} cy={p.y} r={NODE_R+(isPay?28:20)}
                    fill={`url(#grad-${nd.id})`} opacity={isPay?0.9:0.8}/>
                  {isSel&&(
                    <circle cx={p.x} cy={p.y} r={NODE_R+7} fill="none"
                      stroke={nd.color} strokeWidth={1.5} opacity={0.4}>
                      <animate attributeName="r" values={`${NODE_R+5};${NODE_R+17};${NODE_R+5}`} dur="2s" repeatCount="indefinite"/>
                      <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
                    </circle>
                  )}
                  {isPay&&(
                    <circle cx={p.x} cy={p.y} r={NODE_R+8} fill="none"
                      stroke="#fb923c" strokeWidth={1} opacity={0.2}>
                      <animate attributeName="r" values={`${NODE_R+7};${NODE_R+16};${NODE_R+7}`} dur="3s" repeatCount="indefinite"/>
                      <animate attributeName="opacity" values="0.2;0.04;0.2" dur="3s" repeatCount="indefinite"/>
                    </circle>
                  )}
                  <circle cx={p.x} cy={p.y} r={NODE_R+3} fill="none"
                    stroke={nd.color} strokeWidth={isSel?2:1}
                    opacity={isSel?0.9:isPay?0.55:0.28}/>
                  <circle cx={p.x} cy={p.y} r={NODE_R}
                    fill={isSel?`${nd.color}28`:"#111827"}
                    stroke={nd.color} strokeWidth={isPay?2:1.5}
                    filter={(isSel||isPay)?"url(#glow)":undefined}/>
                  <text x={p.x} y={p.y+2} textAnchor="middle" dominantBaseline="middle"
                    fontSize={NODE_R*.68} style={{userSelect:"none",pointerEvents:"none"}}>
                    {nd.icon}
                  </text>
                  <text x={p.x} y={p.y+NODE_R+13} textAnchor="middle"
                    fontSize={11} fill={nd.color} fontWeight={700}
                    style={{userSelect:"none",pointerEvents:"none"}}>
                    {nd.label}
                  </text>
                  <text x={p.x} y={p.y+NODE_R+25} textAnchor="middle"
                    fontSize={9} fill="#4b5563"
                    style={{userSelect:"none",pointerEvents:"none"}}>
                    {nd.role}
                  </text>
                </g>
              );
            })}
          </svg>

          {animStep&&(
            <div style={{position:"absolute",bottom:14,left:"50%",transform:"translateX(-50%)",
              background:"#1e293b",border:"1px solid #334155",borderRadius:20,
              padding:"4px 16px",fontSize:12,color:"#94a3b8"}}>
              Step {animStep} / {Math.max(...visibleFlows.map(f=>f.step))}
            </div>
          )}
        </div>

        {/* ── Right Panel ─────────────────────────────────────────────── */}
        {panelOpen&&(
          <div style={{width:282,borderLeft:"1px solid #1e2535",overflowY:"auto",
            padding:14,flexShrink:0}}>
            {selectedNode
              ? <NodeDetail node={selectedNode} flows={FLOWS} onClose={()=>setSelectedNode(null)} NODES={NODES}/>
              : <FlowPanel
                  flows={FLOWS}
                  activeTab={activeTab}
                  hiddenFlows={hiddenFlows}
                  toggleFlow={toggleFlow}
                  onHover={setHoveredFlow}
                  persona={persona}
                  NODES={NODES}/>
            }
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{borderTop:"1px solid #1e2535",padding:"6px 18px",fontSize:11,
        color:"#334155",display:"flex",gap:14,flexShrink:0,flexWrap:"wrap"}}>
        <span>— Solid = AR (inbound)</span>
        <span>- - - Dashed = AP (outbound)</span>
        <span>⚡ Highlighted = PSA ↔ Payment direct</span>
        <span style={{marginLeft:"auto"}}>Click flows in panel to hide/show</span>
      </div>
    </div>
  );
}

// ─── FLOW TOGGLE PANEL ────────────────────────────────────────────────────────

function FlowPanel({ flows, activeTab, hiddenFlows, toggleFlow, onHover, persona, NODES }) {
  const tabFlows = flows.filter(f=>activeTab==="all"?true:f.type===activeTab);
  const arFlows  = tabFlows.filter(f=>f.type==="ar");
  const apFlows  = tabFlows.filter(f=>f.type==="ap");

  const Section = ({ title, sflows, color }) => (
    <div style={{marginBottom:14}}>
      <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",
        letterSpacing:1,marginBottom:8}}>{title}</div>
      {sflows.map(f=>{
        const isHidden=hiddenFlows.has(f.id);
        const fromNode=NODES[f.from]; const toNode=NODES[f.to];
        return(
          <div key={f.id}
            style={{
              display:"flex",alignItems:"flex-start",gap:8,
              background:isHidden?"#0f172a":"#1e293b",
              borderRadius:7,padding:"7px 9px",marginBottom:5,
              borderLeft:`3px solid ${isHidden?"#334155":f.color}`,
              cursor:"pointer",transition:"all .15s",
              opacity:isHidden?0.5:1,
            }}
            onMouseEnter={()=>{ if(!isHidden) onHover(f.id); }}
            onMouseLeave={()=>onHover(null)}
            onClick={()=>toggleFlow(f.id)}>

            {/* Toggle eye */}
            <div style={{
              flexShrink:0,width:18,height:18,borderRadius:4,
              border:`1px solid ${isHidden?"#334155":f.color}`,
              background:isHidden?"transparent":`${f.color}22`,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:10,marginTop:1,
            }}>
              {isHidden?"—":"✓"}
            </div>

            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3,flexWrap:"wrap"}}>
                <span style={{fontSize:10}}>{fromNode?.icon}</span>
                <span style={{fontSize:10,color:"#475569"}}>→</span>
                <span style={{fontSize:10}}>{toNode?.icon}</span>
                <span style={{fontSize:10,color:isHidden?"#475569":f.color,fontWeight:600}}>
                  {f.label}
                </span>
                {f.highlight&&<span style={{fontSize:9,color:"#fb923c",background:"#fb923c18",
                  borderRadius:6,padding:"1px 5px"}}>⚡ direct</span>}
                <span style={{fontSize:9,color:"#334155",marginLeft:"auto"}}>step {f.step}</span>
              </div>
              <div style={{fontSize:10,color:"#4b5563",lineHeight:1.45}}>{f.detail}</div>
            </div>
          </div>
        );
      })}
    </div>
  );

  return(
    <div>
      <div style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",
        letterSpacing:1,marginBottom:10}}>
        Flow Controls
      </div>
      <div style={{background:"#0f172a",border:"1px solid #1e2535",borderRadius:8,
        padding:"8px 10px",marginBottom:14,fontSize:11,color:"#64748b",lineHeight:1.5}}>
        Click any flow to <strong style={{color:"#94a3b8"}}>hide or show</strong> it on the map.
        Hover to highlight. Use this to walk through the flow step by step.
      </div>

      {(activeTab==="ar"||activeTab==="all") && arFlows.length>0 &&(
        <Section title="💰 AR Flows" sflows={arFlows} />
      )}
      {(activeTab==="ap"||activeTab==="all") && apFlows.length>0 &&(
        <Section title="📤 AP Flows" sflows={apFlows} />
      )}

      {activeTab!=="ap"&&(
        <div style={{background:"#fb923c10",border:"1px solid #fb923c30",borderRadius:8,
          padding:"8px 10px",marginTop:4}}>
          <div style={{fontSize:10,fontWeight:700,color:"#fb923c",marginBottom:5}}>
            ⚡ {NODES.psa?.label} ↔ Payment Provider
          </div>
          <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.5}}>
            {persona==="msp"
              ?"PSA connects directly to the payment provider — auto-bills recurring contracts and receives payment confirmations to close tickets."
              :"PM tool connects directly to the payment provider — triggers client payment requests and receives confirmations to close engagement milestones."}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── NODE DETAIL ─────────────────────────────────────────────────────────────

function NodeDetail({ node, flows, onClose, NODES }) {
  const arFlows=flows.filter(f=>f.type==="ar"&&(f.from===node.id||f.to===node.id));
  const apFlows=flows.filter(f=>f.type==="ap"&&(f.from===node.id||f.to===node.id));
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <span style={{fontSize:25}}>{node.icon}</span>
        <div>
          <div style={{fontWeight:700,fontSize:14,color:node.color}}>{node.label}</div>
          <div style={{fontSize:11,color:"#64748b"}}>{node.role}</div>
        </div>
        <button onClick={onClose} style={{marginLeft:"auto",background:"none",border:"none",
          color:"#64748b",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>
      </div>
      <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.65,marginBottom:14}}>{node.desc}</p>
      {node.paymentNote&&(
        <div style={{background:"#fb923c14",border:"1px solid #fb923c40",borderRadius:8,
          padding:"8px 10px",marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:"#fb923c",marginBottom:4}}>💳 Payment Provider Connection</div>
          <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.5}}>{node.paymentNote}</div>
        </div>
      )}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",
          letterSpacing:1,marginBottom:7}}>Common Tools</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {node.tools.map(t=>(
            <span key={t} style={{background:`${node.color}18`,border:`1px solid ${node.color}44`,
              color:node.color,borderRadius:12,padding:"2px 9px",fontSize:11,fontWeight:600}}>{t}</span>
          ))}
        </div>
      </div>
      {arFlows.length>0&&<FlowSection title="AR Connections" flows={arFlows} nodeId={node.id} NODES={NODES}/>}
      {apFlows.length>0&&<FlowSection title="AP Connections" flows={apFlows} nodeId={node.id} NODES={NODES}/>}
    </div>
  );
}

function FlowSection({ title, flows, nodeId, NODES }) {
  return(
    <div style={{marginBottom:12}}>
      <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",
        letterSpacing:1,marginBottom:7}}>{title}</div>
      {flows.map(f=>(
        <div key={f.id} style={{background:"#1e293b",borderRadius:7,padding:"7px 9px",
          marginBottom:5,borderLeft:`3px solid ${f.color}`}}>
          <div style={{fontSize:11,fontWeight:600,color:"#e2e8f0",marginBottom:3}}>
            {f.from===nodeId?`→ ${NODES[f.to]?.label}`:`← ${NODES[f.from]?.label}`}
            <span style={{marginLeft:6,fontSize:10,color:f.color,
              background:`${f.color}22`,borderRadius:8,padding:"1px 6px"}}>{f.label}</span>
          </div>
          <div style={{fontSize:10,color:"#64748b",lineHeight:1.5}}>{f.detail}</div>
        </div>
      ))}
    </div>
  );
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
